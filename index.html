<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>InkRead - 书架</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">📚 书架</h1>
            <button class="btn-theme" id="themeToggle" aria-label="切换主题">
                <span class="theme-icon">🌓</span>
            </button>
        </header>

        <main class="bookshelf" id="bookshelf">
            <!-- 动态加载书籍列表 -->
        </main>

        <div class="upload-area" id="uploadArea">
            <div class="upload-content">
                <span class="upload-icon">📖</span>
                <p class="upload-text">点击或拖拽上传电子书</p>
                <input type="file" id="fileInput" accept=".epub,.pdf,.txt" hidden>
            </div>
        </div>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-view="shelf">
                <span class="nav-icon">📚</span>
                <span class="nav-label">书架</span>
            </button>
            <button class="nav-btn" data-view="summary">
                <span class="nav-icon">📝</span>
                <span class="nav-label">摘要</span>
            </button>
            <button class="nav-btn" data-view="settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">设置</span>
            </button>
        </nav>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
