<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>InkRead - 书架</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">📚 书架</h1>
            <button class="btn-theme" id="themeToggle" aria-label="切换主题">
                <span class="theme-icon">🌓</span>
            </button>
        </header>

        <main class="bookshelf" id="bookshelf">
            <!-- 动态加载书籍列表 -->
        </main>

        <div class="upload-area" id="uploadArea">
            <div class="upload-content">
                <span class="upload-icon">📖</span>
                <p class="upload-text">点击或拖拽上传电子书</p>
                <input type="file" id="fileInput" accept=".epub,.pdf,.txt" hidden>
            </div>
        </div>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-view="shelf">
                <span class="nav-icon">📚</span>
                <span class="nav-label">书架</span>
            </button>
            <button class="nav-btn" data-view="sources">
                <span class="nav-icon">🔗</span>
                <span class="nav-label">书源</span>
            </button>
            <button class="nav-btn" data-view="summary">
                <span class="nav-icon">📝</span>
                <span class="nav-label">摘要</span>
            </button>
            <button class="nav-btn" data-view="settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">设置</span>
            </button>
        </nav>

    <!-- 书源管理模态框 -->
    <div class="source-modal" id="sourceModal">
        <div class="source-modal-content">
            <div class="source-modal-header">
                <h3>📡 书源管理</h3>
                <button class="btn-close" id="closeSourceModal">×</button>
            </div>
            <div class="source-modal-tabs">
                <button class="source-tab active" data-tab="sources">📚 书源</button>
                <button class="source-tab" data-tab="rules">🧹 净化规则</button>
            </div>
            <div class="source-modal-body">
                <!-- 书源列表 -->
                <div class="tab-content" id="tabSources">
                    <div class="source-toolbar">
                        <button class="btn-primary" id="addSourceBtn">➕ 添加书源</button>
                    </div>
                    <div class="source-list" id="sourceList">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
                <!-- 净化规则列表 -->
                <div class="tab-content" id="tabRules" style="display:none;">
                    <div class="source-toolbar">
                        <button class="btn-primary" id="addRuleBtn">➕ 添加规则</button>
                    </div>
                    <div class="source-list" id="ruleList">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 书源表单模态框 -->
    <div class="source-form-modal" id="sourceFormModal">
        <div class="source-form-content">
            <div class="source-form-header">
                <h3 id="sourceFormTitle">添加书源</h3>
                <button class="btn-close" id="closeSourceForm">×</button>
            </div>
            <form class="source-form" id="sourceForm">
                <input type="hidden" id="sourceId">
                <div class="form-group">
                    <label for="sourceName">书源名称 *</label>
                    <input type="text" id="sourceName" required placeholder="例如：笔趣阁">
                </div>
                <div class="form-group">
                    <label for="sourceUrlTemplate">URL 模板 *</label>
                    <input type="text" id="sourceUrlTemplate" required placeholder="https://example.com/book/{searchTerm}">
                </div>
                <div class="form-group">
                    <label for="sourceEncoding">编码</label>
                    <select id="sourceEncoding">
                        <option value="utf-8" selected>UTF-8</option>
                        <option value="gbk">GBK</option>
                        <option value="gb2312">GB2312</option>
                        <option value="gb18030">GB18030</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="bookNameRule">书名规则 * (XPath/正则)</label>
                    <input type="text" id="bookNameRule" required placeholder="//h1[@class='title']">
                </div>
                <div class="form-group">
                    <label for="authorRule">作者规则 (XPath/正则)</label>
                    <input type="text" id="authorRule" placeholder="//span[@class='author']">
                </div>
                <div class="form-group">
                    <label for="chapterListRule">章节列表规则 * (XPath)</label>
                    <input type="text" id="chapterListRule" required placeholder="//div[@class='chapter-list']//a">
                </div>
                <div class="form-group">
                    <label for="chapterUrlRule">章节URL规则 * (XPath)</label>
                    <input type="text" id="chapterUrlRule" required placeholder="@href">
                </div>
                <div class="form-group">
                    <label for="contentRule">正文规则 * (XPath)</label>
                    <input type="text" id="contentRule" required placeholder="//div[@class='content']">
                </div>
                <div class="form-group">
                    <label class="toggle-label">
                        <span>启用书源</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="sourceEnabled" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </label>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelSourceForm">取消</button>
                    <button type="submit" class="btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 测试书源结果 -->
    <div class="source-test-modal" id="sourceTestModal">
        <div class="source-form-content">
            <div class="source-form-header">
                <h3>🧪 书源测试</h3>
                <button class="btn-close" id="closeSourceTest">×</button>
            </div>
            <div class="source-test-body" id="sourceTestBody">
                <div class="loading">测试中...</div>
            </div>
        </div>
    </div>

    <!-- 净化规则表单模态框 -->
    <div class="source-form-modal" id="ruleFormModal">
        <div class="source-form-content">
            <div class="source-form-header">
                <h3 id="ruleFormTitle">添加净化规则</h3>
                <button class="btn-close" id="closeRuleForm">×</button>
            </div>
            <form class="source-form" id="ruleForm">
                <input type="hidden" id="ruleId">
                <div class="form-group">
                    <label for="ruleName">规则名称 *</label>
                    <input type="text" id="ruleName" required placeholder="例如：去除广告">
                </div>
                <div class="form-group">
                    <label for="ruleType">规则类型 *</label>
                    <select id="ruleType" required>
                        <option value="replace">文本替换</option>
                        <option value="remove">文本删除</option>
                        <option value="regex">正则替换</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="rulePattern">匹配模式 *</label>
                    <input type="text" id="rulePattern" required placeholder="输入要匹配的文本或正则表达式">
                </div>
                <div class="form-group">
                    <label for="ruleReplacement">替换文本</label>
                    <input type="text" id="ruleReplacement" placeholder="留空则删除匹配内容">
                </div>
                <div class="form-group">
                    <label for="rulePriority">优先级</label>
                    <input type="number" id="rulePriority" value="0" min="0" max="100" placeholder="数字越大优先级越高">
                </div>
                <div class="form-group">
                    <label class="toggle-label">
                        <span>启用规则</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="ruleEnabled" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </label>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelRuleForm">取消</button>
                    <button type="submit" class="btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
